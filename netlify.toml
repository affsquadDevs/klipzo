[build]
  command = "npm run build"
  publish = "dist"

# Header rules live in public/_headers (copied to the site root at build time), so
# they stay in one place across Netlify and Cloudflare Pages. Netlify also honors the
# block below; keep it in sync with public/_headers if you edit either.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), browsing-topics=()"

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"
